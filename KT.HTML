<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材质ID色块图生成器 (原始尺寸)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #1e1e1e;
            color: #eee;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        input[type="file"] {
            margin: 20px; padding: 10px; background: #333;
            border: 1px solid #555; color: #fff; border-radius: 6px; cursor: pointer;
        }
        .controls {
            margin: 15px 0; display: flex; align-items: center;
            justify-content: center; gap: 15px; flex-wrap: wrap;
        }
        label { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { width: 120px; }
        button {
            padding: 10px 25px; background: #ff6600; border: none;
            color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px;
        }
        button:disabled { background: #555; cursor: not-allowed; }
        .preview {
            display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap;
        }
        .preview div {
            background: #2a2a2a; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); max-width: 100%;
        }
        img, canvas {
            display: block; border-radius: 4px; border: 1px solid #444;
            max-width: 100%; height: auto; /* 显示时缩放以适应屏幕，但实际尺寸是原始尺寸 */
        }
        .caption { margin-top: 10px; color: #aaa; font-size: 14px; }
        .warning {
            background: #3a3000; border-left: 4px solid #ffaa00; padding: 12px;
            margin: 20px auto; text-align: left; max-width: 700px; border-radius: 6px;
            color: #ddd; font-size: 14px;
        }
        #progress {
            margin: 15px 0; color: #ffaa00; font-weight: bold; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 材质ID色块图 (原图尺寸)</h2>
        <div class="warning">
            ⚠️ <strong>基于颜色聚类的简易版，非AI分割。</strong><br>
            • 生成图像尺寸与上传图片完全一致。<br>
            • 大尺寸图片（>2000px）处理会非常慢，可能造成浏览器卡顿，请耐心等待。<br>
            • 真正精准的材质ID通道，仍建议使用 KeyShot 渲染 Material ID Pass。
        </div>

        <input type="file" id="upload" accept="image/*">
        
        <div class="controls">
            <label>
                分割块数: <input type="range" id="kRange" min="2" max="12" value="5">
                <span id="kValue">5</span>
            </label>
            <button id="generateBtn">生成色块图</button>
        </div>
        <div id="progress">⏳ 正在处理中，请稍候…</div>

        <div class="preview">
            <div>
                <p class="caption">原图</p>
                <img id="originalImg" src="#" alt="原图" style="display: none;">
                <p id="placeholder" style="color:#666; margin-top:100px;">请上传图片</p>
            </div>
            <div>
                <p class="caption">材质ID色块图 (原始尺寸)</p>
                <canvas id="outputCanvas" style="display: none;"></canvas>
                <p id="placeholder2" style="color:#666; margin-top:100px;">等待生成</p>
            </div>
        </div>
        <p style="margin-top: 20px; font-size:13px; color:#888;">
            原理：K-means 颜色聚类 → 每类填充不同色相 → 输出与原图尺寸完全一致的色块图。
        </p>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const originalImg = document.getElementById('originalImg');
        const outputCanvas = document.getElementById('outputCanvas');
        const generateBtn = document.getElementById('generateBtn');
        const kRange = document.getElementById('kRange');
        const kValue = document.getElementById('kValue');
        const placeholder = document.getElementById('placeholder');
        const placeholder2 = document.getElementById('placeholder2');
        const progressDiv = document.getElementById('progress');
        
        let uploadedImage = null;

        kRange.addEventListener('input', () => {
            kValue.textContent = kRange.value;
        });

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                uploadedImage = new Image();
                uploadedImage.onload = () => {
                    originalImg.src = event.target.result;
                    originalImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    outputCanvas.style.display = 'none';
                    placeholder2.style.display = 'block';
                };
                uploadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        generateBtn.addEventListener('click', () => {
            if (!uploadedImage) {
                alert('请先上传一张图片');
                return;
            }

            const k = parseInt(kRange.value);
            const width = uploadedImage.width;
            const height = uploadedImage.height;

            // 禁用按钮，显示进度
            generateBtn.disabled = true;
            progressDiv.style.display = 'block';

            // 使用 setTimeout 避免阻塞 UI，让进度条先显示
            setTimeout(() => {
                try {
                    // 将原图绘制到临时canvas以获取像素
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = width;
                    tempCanvas.height = height;
                    const ctx = tempCanvas.getContext('2d');
                    ctx.drawImage(uploadedImage, 0, 0, width, height);
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const pixels = imageData.data;

                    // 提取 RGB，透明像素记为 null
                    const totalPixels = width * height;
                    const rgbPixels = new Array(totalPixels);
                    for (let i = 0; i < totalPixels; i++) {
                        const idx = i * 4;
                        const a = pixels[idx + 3];
                        if (a > 10) {
                            rgbPixels[i] = [pixels[idx], pixels[idx+1], pixels[idx+2]];
                        } else {
                            rgbPixels[i] = null;
                        }
                    }

                    // 采样：每4个像素取1个样本进行聚类，否则计算量太大
                    const sampleStep = 4;
                    const samples = [];
                    for (let i = 0; i < totalPixels; i += sampleStep) {
                        if (rgbPixels[i] !== null) {
                            samples.push(rgbPixels[i]);
                        }
                    }

                    if (samples.length === 0) {
                        throw new Error('图片没有有效像素');
                    }

                    // K-means 聚类
                    const centers = [];
                    const usedIndexes = new Set();
                    while (centers.length < k && usedIndexes.size < samples.length) {
                        const idx = Math.floor(Math.random() * samples.length);
                        if (!usedIndexes.has(idx)) {
                            usedIndexes.add(idx);
                            centers.push([...samples[idx]]);
                        }
                    }
                    while (centers.length < k) {
                        centers.push([Math.floor(Math.random()*256), Math.floor(Math.random()*256), Math.floor(Math.random()*256)]);
                    }

                    const assignments = new Array(samples.length);
                    for (let iter = 0; iter < 10; iter++) {
                        // 分配
                        for (let i = 0; i < samples.length; i++) {
                            let minDist = Infinity;
                            let best = 0;
                            for (let j = 0; j < k; j++) {
                                const dr = samples[i][0] - centers[j][0];
                                const dg = samples[i][1] - centers[j][1];
                                const db = samples[i][2] - centers[j][2];
                                const dist = dr*dr + dg*dg + db*db;
                                if (dist < minDist) {
                                    minDist = dist;
                                    best = j;
                                }
                            }
                            assignments[i] = best;
                        }
                        // 更新中心
                        const sums = Array.from({ length: k }, () => [0, 0, 0, 0]);
                        for (let i = 0; i < samples.length; i++) {
                            const c = assignments[i];
                            sums[c][0] += samples[i][0];
                            sums[c][1] += samples[i][1];
                            sums[c][2] += samples[i][2];
                            sums[c][3] += 1;
                        }
                        for (let j = 0; j < k; j++) {
                            if (sums[j][3] > 0) {
                                centers[j][0] = Math.round(sums[j][0] / sums[j][3]);
                                centers[j][1] = Math.round(sums[j][1] / sums[j][3]);
                                centers[j][2] = Math.round(sums[j][2] / sums[j][3]);
                            }
                        }
                    }

                    // 为每个聚类分配高对比度颜色（基于色相环均匀分布）
                    const clusterColors = [];
                    for (let i = 0; i < k; i++) {
                        const hue = (i * 360 / k) % 360;
                        const s = 0.8, v = 0.9;
                        const c = v * s;
                        const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
                        const m = v - c;
                        let r, g, b;
                        if (hue < 60) { r = c; g = x; b = 0; }
                        else if (hue < 120) { r = x; g = c; b = 0; }
                        else if (hue < 180) { r = 0; g = c; b = x; }
                        else if (hue < 240) { r = 0; g = x; b = c; }
                        else if (hue < 300) { r = x; g = 0; b = c; }
                        else { r = c; g = 0; b = x; }
                        r = Math.round((r + m) * 255);
                        g = Math.round((g + m) * 255);
                        b = Math.round((b + m) * 255);
                        clusterColors.push([r, g, b]);
                    }

                    // 分配每个像素到最近中心，生成输出图
                    const outputCtx = outputCanvas.getContext('2d');
                    outputCanvas.width = width;
                    outputCanvas.height = height;
                    const outImageData = outputCtx.createImageData(width, height);
                    const outPixels = outImageData.data;

                    for (let i = 0; i < totalPixels; i++) {
                        const pixel = rgbPixels[i];
                        const outIdx = i * 4;
                        if (pixel === null) {
                            outPixels[outIdx] = 0;
                            outPixels[outIdx+1] = 0;
                            outPixels[outIdx+2] = 0;
                            outPixels[outIdx+3] = 0;
                        } else {
                            let minDist = Infinity;
                            let best = 0;
                            for (let j = 0; j < k; j++) {
                                const dr = pixel[0] - centers[j][0];
                                const dg = pixel[1] - centers[j][1];
                                const db = pixel[2] - centers[j][2];
                                const dist = dr*dr + dg*dg + db*db;
                                if (dist < minDist) {
                                    minDist = dist;
                                    best = j;
                                }
                            }
                            const color = clusterColors[best];
                            outPixels[outIdx] = color[0];
                            outPixels[outIdx+1] = color[1];
                            outPixels[outIdx+2] = color[2];
                            outPixels[outIdx+3] = 255;
                        }
                    }

                    outputCtx.putImageData(outImageData, 0, 0);
                    outputCanvas.style.display = 'block';
                    placeholder2.style.display = 'none';
                } catch (err) {
                    alert('处理出错: ' + err.message);
                } finally {
                    generateBtn.disabled = false;
                    progressDiv.style.display = 'none';
                }
            }, 50); // 延迟让UI更新
        });
    </script>
</body>
</html>
