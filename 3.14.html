<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古塔罗 · 单张占卜</title>
    <style>
        :root {
            --bg: #0d0a0b;
            --parchment: #f4e4c1;
            --parchment-dark: #d4b896;
            --gold: #b49450;
            --gold-light: #d4b96a;
            --blood: #8b3a3a;
            --text: #2c2416;
            --shadow: 0 0 30px rgba(180, 148, 80, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1e1715 0%, #0a0706 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', '宋体', serif;
            padding: 20px;
            background-attachment: fixed;
        }

        /* 羊皮纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* 标题装饰 */
        .title-section {
            margin-bottom: 2rem;
        }
        .title-section h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.4rem;
            font-weight: normal;
            letter-spacing: 0.3em;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(180, 148, 80, 0.5);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--gold-light);
            opacity: 0.6;
            margin: 8px 0;
        }
        .divider span {
            font-size: 1.2rem;
        }
        .divider::before, .divider::after {
            content: '';
            height: 1px;
            width: 60px;
            background: linear-gradient(to right, transparent, var(--gold-light), transparent);
        }

        /* 牌桌区域 */
        .table {
            position: relative;
            width: 230px;
            height: 360px;
            margin: 0 auto 2rem;
            perspective: 1200px;
        }

        /* 牌堆（多张叠放） */
        .deck {
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .deck:hover {
            transform: translateY(-5px);
        }
        .deck:active {
            transform: scale(0.96);
        }

        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background: #1a1020;
            border: 3px solid #5e4a3a;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 30px rgba(180,148,80,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 40% 40%, rgba(255,215,0,0.1) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 3px, transparent 3px, transparent 10px);
        }
        /* 牌背中心的古老符号 */
        .card-back::before {
            content: '☉';
            font-size: 4.5rem;
            color: rgba(212, 168, 83, 0.7);
            text-shadow: 0 0 25px #b8860b;
            animation: flicker 2.5s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.7; text-shadow: 0 0 15px #b8860b; }
            100% { opacity: 1; text-shadow: 0 0 30px #ffd700, 0 0 50px #b8860b; }
        }

        .deck .card-back:nth-child(1) { transform: translateY(0px) rotate(0deg); z-index: 3; }
        .deck .card-back:nth-child(2) { transform: translateY(5px) rotate(1.5deg); z-index: 2; opacity: 0.85; }
        .deck .card-back:nth-child(3) { transform: translateY(10px) rotate(-1.5deg); z-index: 1; opacity: 0.7; }

        /* 抽出的牌（翻转容器） */
        .drawn-card {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }
        .drawn-card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        /* 正面牌面（古老羊皮纸风格） */
        .card-front {
            background: linear-gradient(135deg, #faf0d7 0%, #ecdcc0 100%);
            border: 4px double #8b6f4c;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 20px;
            text-align: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
        }
        .card-front::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(139, 106, 76, 0.4);
            pointer-events: none;
        }

        /* 逆位时内容倒转 */
        .card-front.reversed-content {
            transform: rotateY(180deg) rotate(180deg);
        }

        .card-symbol {
            font-size: 3.8rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
        }
        .card-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c2416;
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }
        .card-roman {
            font-size: 0.9rem;
            color: #6b5a44;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }
        .position-badge {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 0.75rem;
            background: #8b3a3a;
            color: #f0dbb0;
            padding: 3px 12px;
            border-radius: 20px;
            letter-spacing: 0.15em;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        /* 解读区域（隐藏在牌面下部，抽牌后可滚动查看） */
        .reading-box {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #2c2416;
            line-height: 1.6;
            max-height: 90px;
            overflow-y: auto;
            padding: 0 5px;
            border-top: 1px dashed #b49450;
            padding-top: 8px;
            text-align: left;
            font-style: italic;
            scrollbar-width: thin;
            scrollbar-color: #b49450 #f4e4c1;
        }
        .reading-box::-webkit-scrollbar {
            width: 4px;
        }
        .reading-box::-webkit-scrollbar-track {
            background: #f4e4c1;
        }
        .reading-box::-webkit-scrollbar-thumb {
            background: #b49450;
            border-radius: 3px;
        }

        /* 背面（抽出的那张的背） */
        .card-back-face {
            background: #1a1020;
            border: 3px solid #5e4a3a;
            background-image: radial-gradient(circle at 40% 40%, rgba(255,215,0,0.1) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 3px, transparent 3px, transparent 10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-back-face::before {
            content: '☉';
            font-size: 4.5rem;
            color: rgba(212, 168, 83, 0.7);
        }

        /* 按钮区 */
        .controls {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-light);
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: 0.12em;
            transition: all 0.3s;
            text-shadow: 0 0 8px rgba(180,148,80,0.4);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            text-transform: uppercase;
        }
        .btn:hover {
            background: rgba(180, 148, 80, 0.2);
            box-shadow: 0 0 25px rgba(180,148,80,0.4);
            border-color: #e6c468;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.95);
        }

        .message {
            color: #b49450;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            min-height: 24px;
            font-style: italic;
            opacity: 0.8;
        }

        @media (max-width: 450px) {
            .table { width: 190px; height: 300px; }
            .card-symbol { font-size: 3rem; }
            .card-name { font-size: 1.3rem; }
            .title-section h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-section">
            <h1>古 塔 罗</h1>
            <div class="divider"><span>☉</span></div>
        </div>

        <div class="table" id="tableArea">
            <!-- 牌堆（未抽牌时可见） -->
            <div class="deck" id="deckPile">
                <div class="card-back"></div>
                <div class="card-back"></div>
                <div class="card-back"></div>
            </div>

            <!-- 抽出的牌（初始隐藏） -->
            <div class="drawn-card" id="drawnCard" style="display: none;">
                <div class="card-face card-back-face"></div>
                <div class="card-face card-front" id="cardFront">
                    <span class="position-badge" id="positionBadge"></span>
                    <div class="card-symbol" id="cardSymbol"></div>
                    <div class="card-name" id="cardName"></div>
                    <div class="card-roman" id="cardRoman"></div>
                    <div class="reading-box" id="cardReading"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="drawBtn">抽取圣牌</button>
            <button class="btn" id="reshuffleBtn" style="display: none;">再次求问</button>
        </div>
        <div class="message" id="messageBox">静默你的心，触碰牌堆…</div>
    </div>

    <script>
        (function() {
            // ---------- 古老塔罗牌义库 ----------
            const tarotDeck = [
                // 大阿卡纳
                { id:0, name:"愚者", roman:"0", symbol:"🌅", type:"major",
                  upright:"一段全新的旅程即将展开，你站在悬崖边，内心充满纯粹的信任与好奇。无需过度计划，宇宙正托着你迈出那一步。这是冒险、天真与无限可能的开端。",
                  reversed:"或许你正因害怕未知而裹足不前，或是冲动行事而忽略了脚下的风险。提醒自己，勇气不等于鲁莽，稍作停留审视内心，再决定是否跳跃。" },
                { id:1, name:"魔术师", roman:"Ⅰ", symbol:"🪄", type:"major",
                  upright:"此刻你手握所有需要的元素——意志、技巧与机遇。正如魔术师指向天地，你有能力将意念显化为现实。自信地行动，世界是你的舞台。",
                  reversed:"你的力量正被分散，可能表现为欺骗、操控或缺乏专注。检查自己是否在滥用才华，或是否因自我怀疑而让能力沉睡。" },
                { id:2, name:"女祭司", roman:"Ⅱ", symbol:"📖", type:"major",
                  upright:"深入内在的静默吧，答案并不在外界，而在你潜意识的深处。信任直觉、梦境与反复出现的征兆。有些秘密只能在沉静中被领悟。",
                  reversed:"你可能忽视了内心的声音，或过分依赖逻辑而压抑了情感。秘密可能被隐藏，或有人正对你保守关键信息。重新连接你的直觉。" },
                { id:3, name:"皇后", roman:"Ⅲ", symbol:"👸", type:"major",
                  upright:"丰饶、滋养与感官的满足正环绕着你。这是创造力开花结果的时刻，无论是孕育生命、艺术作品还是新的事业方向。允许自己享受自然的恩泽。",
                  reversed:"你或许在过度依赖他人，或陷入物质享乐的困境中。创造力的源泉暂时干涸，需要回归内心，找回自我滋养的能力，而非向外索取。" },
                { id:4, name:"皇帝", roman:"Ⅳ", symbol:"👑", type:"major",
                  upright:"秩序、权威与坚定的结构是你的后盾。通过纪律和清晰的边界，你能建立稳固的王国。此刻需要以理性与领导力应对局面，成为自己的主宰。",
                  reversed:"权威可能被滥用，或是你正感受到来自强权的压迫。内心缺乏纪律导致混乱，也可能表现为固执与独裁。重新审视权力在你生命中的意义。" },
                { id:5, name:"教皇", roman:"Ⅴ", symbol:"✝️", type:"major",
                  upright:"寻求智慧的指引，无论是来自传统、导师还是你内在的信仰体系。遵照既定的规则与仪式，你能获得精神上的认同与归属。这是学习与传递光亮的时刻。",
                  reversed:"你正在挑战传统，或对教条式的灌输感到厌倦。也可能是陷入盲从，失去了独立思考。真正的信仰应带来自由，而非束缚。" },
                { id:6, name:"恋人", roman:"Ⅵ", symbol:"❤️", type:"major",
                  upright:"爱的选择摆在眼前，不仅关乎感情，更是价值观的校准。在结合中保持真实的自我，从坦诚的交流中诞生更深层的和谐。这是心与心的共鸣。",
                  reversed:"分离、诱惑或价值观的冲突正在考验你。可能因恐惧亲密而推开真爱，或因错误的选择导致关系失衡。向内看，究竟什么才是你真正珍视的。" },
                { id:7, name:"战车", roman:"Ⅶ", symbol:"🏆", type:"major",
                  upright:"意志力是此刻制胜的关键。通过驾驭内在相反的力量，你便能突破障碍，一路向前。胜利在望，只要你不放弃对方向的掌控。",
                  reversed:"失控、挫败或侵略性让你偏离了轨道。你可能用力过猛，或完全失去了斗志。停下来，检查你前进的方向是否真的由心而定。" },
                { id:8, name:"力量", roman:"Ⅷ", symbol:"🦁", type:"major",
                  upright:"真正的力量来自温柔与耐心。驯服内在的野兽并非靠蛮力，而是用理解与慈悲。你拥有以柔克刚的能力，用平静化解冲突。",
                  reversed:"你正被恐惧或愤怒支配，内在的力量被扭曲为暴力或软弱。或许你正试图控制不可控之物。找回内心的平静，力量才会回归。" },
                { id:9, name:"隐士", roman:"Ⅸ", symbol:"🏮", type:"major",
                  upright:"退回到内在的殿堂，像隐士一般点亮手中明灯。这是寻求真理与自我认知的孤独旅程。不要害怕独处，寂静中自有启示降临。",
                  reversed:"你可能在逃避必要的社交，或陷入过度的孤立与偏执。智慧被固执遮蔽，不愿接受外界的帮助。问问自己，这份孤独是滋养还是囚禁？" },
                { id:10, name:"命运之轮", roman:"Ⅹ", symbol:"☸️", type:"major",
                  upright:"命运的车轮正转向你有利的位置。惊喜、机遇与转变不期而至。顺应时势，接受宇宙的流转，你将升至新的阶段。",
                  reversed:"时运不佳，或你正抗拒生命必然的改变。厄运的感觉并非永恒，但需要你认识到，有些循环该被打破，有些因果需要面对。" },
                { id:11, name:"正义", roman:"Ⅺ", symbol:"⚖️", type:"major",
                  upright:"真理与公正即将显现。法律、契约或因果法则将带来平衡。诚实地面对自己与他人，任何一个决定都需承担相应的责任。",
                  reversed:"不公、偏见或逃避责任正造成失衡。事情可能未得到公正裁决，或你对自己过于严苛。审视是否隐藏了部分真相。" },
                { id:12, name:"倒吊人", roman:"Ⅻ", symbol:"🙃", type:"major",
                  upright:"以不同的视角看待世界吧，牺牲暂时的舒适，换来深刻的洞见。这是自愿的悬置，等待时机的艺术。臣服不是失败，而是另一种形式的胜利。",
                  reversed:"你可能被卡在毫无意义的牺牲中，或抗拒着必要的视角转换。停滞不前，固执己见，使你无法看清更大的图景。放手，让新视野进来。" },
                { id:13, name:"死神", roman:"ⅩⅢ", symbol:"💀", type:"major",
                  upright:"一个阶段注定要结束，为新生腾出空间。这不是肉体的消亡，而是蜕变、彻底的转变。允许旧我剥落，你才能迎来重生。",
                  reversed:"你正死死抓住行将朽烂的人事物，因恐惧终结而停滞不前。改变被延迟，但不会消失。接受流动，否则将被其拖垮。" },
                { id:14, name:"节制", roman:"ⅩⅣ", symbol:"🌊", type:"major",
                  upright:"调和矛盾，寻找中道。像炼金术士一样，将生活中的对立元素融合为更高的和谐。温柔地调适，耐心地平衡，一切自会恰到好处。",
                  reversed:"失衡、过度或冲突正在消耗你。可能表现为放纵、急躁或无法兼容的拉扯。回归中心，找回生活的韵律。" },
                { id:15, name:"恶魔", roman:"ⅩⅤ", symbol:"😈", type:"major",
                  upright:"你正被物质的欲望、成瘾或有害的关系所束缚。讽刺的是，牢笼的门并未锁，你随时可以挣脱。看清那些困住你的锁链，它们多源于恐惧。",
                  reversed:"挣脱与觉醒的时刻来临。你终于看穿了束缚的本质，开始打破恶习、有毒的关系。这是重获自由的契机。" },
                { id:16, name:"高塔", roman:"ⅩⅥ", symbol:"🏚️", type:"major",
                  upright:"旧有的结构在闪电中崩塌，尽管令人震惊，却是必要的清算。虚假的稳固无法长久，崩塌之后，真理的基石会暴露出来。",
                  reversed:"你正竭尽全力阻止一场不可避免的崩塌，或正从废墟中缓慢恢复。恐惧改变只会延长痛苦。信任这个释放的过程。" },
                { id:17, name:"星星", roman:"ⅩⅦ", symbol:"⭐", type:"major",
                  upright:"希望如星光洒落，疗愈与宁静降临。暴风雨后，你已清洗了尘埃，现在可以赤诚地面对宇宙。接收这份纯净的灵感与信任。",
                  reversed:"你感到希望渺茫，或对信仰产生了怀疑。灵感枯竭，陷入悲观。但请记住，星光并未消失，只是暂时被云层遮蔽。" },
                { id:18, name:"月亮", roman:"ⅩⅧ", symbol:"🌙", type:"major",
                  upright:"潜意识的水域泛起涟漪，恐惧、幻象与梦境交织。前路不明，但正是这种模糊引导你深入内心。不要相信表面，倾听直觉的低语。",
                  reversed:"迷雾渐渐散开，真相即将显露。你正摆脱焦虑与混乱的梦境，看清了幻觉背后的实相。内心的平静逐渐恢复。" },
                { id:19, name:"太阳", roman:"ⅩⅨ", symbol:"☀️", type:"major",
                  upright:"喜悦、成功与充沛的生命力如日方中。这是纯粹的快乐与自信，你的光芒温暖四周，一切都清晰明朗。享受这份坦荡的成就。",

                  upright:"匮乏与孤立，你感到被排斥在温暖与丰盛之外。但内在的光明从未消失，转机就在转身处。",
                  reversed:"转机到来，援助与温暖回归。你找到了精神的归宿或物质的支持。困境正在消散。" },
                { name:"星币六", type:"pentacles", symbol:"🤲",
                  upright:"给予与接受的平衡，慈善与公平的分配。你处于给予者或接收者的位置，请带着善意行使这份权力。",
                  reversed:"不平等，施舍带着傲慢，或被人剥削。检查关系中是否存在不公的付出与索取。" },
                { name:"星币七", type:"pentacles", symbol:"🌱",
                  upright:"耐心等待收成，评估已付出的努力。你站在成长的作物前，思考下一步。这是回顾与调整的时期。",
                  reversed:"焦虑，收成不如预期，或付出的努力未见回报。考虑是否方向有误，及时调整。" },
                { name:"星币八", type:"pentacles", symbol:"🔨",
                  upright:"勤奋与专注，技艺的精进。你日复一日地敲打，磨练出精湛的技能。投入带来实质的成果。",
                  reversed:"粗制滥造，倦怠，或缺乏动力。工作变得机械无趣，品质下滑。重新注入热情。" },
                { name:"星币九", type:"pentacles", symbol:"🦚",
                  upright:"优雅的富足与独立。你享受着辛勤换来的果实，环境优渥，自我价值感高。这是对自己努力的奖赏。",
                  reversed:"表面的光鲜，内在的不安全感。你依赖物质来定义价值，却感到了空虚。找回真正的自我认同。" },
                { name:"星币十", type:"pentacles", symbol:"🏰",
                  upright:"家族传承，稳固的家业与长期的繁荣。这不仅仅是金钱，还有血脉与文化的延续。感受世代的力量。",
                  reversed:"家族纷争，遗产问题，或家道中落。物质虽在，精神纽带却断裂了。重新连接根脉。" },
                { name:"星币侍从", type:"pentacles", symbol:"📚",
                  upright:"务实的学习，新的财务机会或技能的萌芽。你手握星币，专注而认真。这是打好基础的阶段。",
                  reversed:"懈怠，坏消息，或学习停滞。你可能因缺乏耐心而错失成长的机会。回归基本功。" },
                { name:"星币骑士", type:"pentacles", symbol:"🐂",
                  upright:"勤勉可靠，稳健地朝着目标前进。虽慢，但每一步都坚实。责任与毅力是你的标志。",
                  reversed:"停滞，顽固，或责任感变成负担。你动弹不得，因为太害怕改变。试着灵活一些。" },
                { name:"星币王后", type:"pentacles", symbol:"👩‍🌾",
                  upright:"务实而慷慨的滋养者，懂得如何让物质世界丰盛。她照顾身体与家园，是财务安全的守护者。",
                  reversed:"忽视，物质主义，或过分追求舒适。你的安全感可能建立在对环境的过度控制上。回归自然与信任。" },
                { name:"星币国王", type:"pentacles", symbol:"👨‍🌾",
                  upright:"财富与稳健的商业头脑，成功的成熟企业家。你通过勤奋与守信建立了帝国。享受丰收，也回馈社群。",
                  reversed:"贪婪，守财奴，或为富不仁。对物质的欲望让你失去了对人性与道德的关注。分享，才能更富足。" }
            ];

            // DOM 元素
            const deckPile = document.getElementById('deckPile');
            const drawnCard = document.getElementById('drawnCard');
            const cardFront = document.getElementById('cardFront');
            const cardSymbol = document.getElementById('cardSymbol');
            const cardName = document.getElementById('cardName');
            const cardRoman = document.getElementById('cardRoman');
            const cardReading = document.getElementById('cardReading');
            const positionBadge = document.getElementById('positionBadge');
            const messageBox = document.getElementById('messageBox');
            const drawBtn = document.getElementById('drawBtn');
            const reshuffleBtn = document.getElementById('reshuffleBtn');

            let isCardDrawn = false;
            let currentCardData = null;
            let isReversed = false;

            // 随机抽取
            function drawRandomCard() {
                return tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
            }
            function randomReversed() {
                return Math.random() < 0.5;
            }

            // 重置
            function resetToDeck() {
                drawnCard.style.display = 'none';
                drawnCard.classList.remove('flipped');
                deckPile.style.display = 'block';
                isCardDrawn = false;
                currentCardData = null;
                drawBtn.style.display = 'inline-block';
                reshuffleBtn.style.display = 'none';
                messageBox.textContent = '静默你的心，触碰牌堆…';
                cardFront.classList.remove('reversed-content');
            }

            // 抽牌并展示
            function performDraw() {
                if (isCardDrawn) return;

                const card = drawRandomCard();
                const reversed = randomReversed();
                currentCardData = card;
                isReversed = reversed;

                // 填入内容
                cardSymbol.textContent = card.symbol || '🃏';
                cardName.textContent = card.name;
                if (card.roman) {
                    cardRoman.textContent = card.roman;
                    cardRoman.style.display = 'block';
                } else {
                    cardRoman.textContent = '';
                    cardRoman.style.display = 'none';
                }
                const readingText = reversed ? card.reversed : card.upright;
                cardReading.textContent = readingText;
                positionBadge.textContent = reversed ? '逆位' : '正位';

                if (reversed) {
                    cardFront.classList.add('reversed-content');
                } else {
                    cardFront.classList.remove('reversed-content');
                }

                deckPile.style.display = 'none';
                drawnCard.style.display = 'block';
                void drawnCard.offsetWidth;
                drawnCard.classList.add('flipped');

                isCardDrawn = true;
                drawBtn.style.display = 'none';
                reshuffleBtn.style.display = 'inline-block';
                messageBox.textContent = `「${card.name}」${reversed ? '逆位' : '正位'}已显现 — 默观其义`;
            }

            // 事件
            deckPile.addEventListener('click', performDraw);
            drawBtn.addEventListener('click', performDraw);
            reshuffleBtn.addEventListener('click', resetToDeck);

            // 初始状态
            resetToDeck();
        })();
    </script>
</body>
</html>
