            background-color: #457b9d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1d3557;
        }
        /* 加载动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }

        }
        .loading {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #457b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
